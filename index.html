<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIVIA は現在非公開です</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="description" content="AIVIA は現在非公開です。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffaf2;
      --text: #1f1a17;
      --muted: #6d625a;
      --accent: #9f3d1c;
      --line: #decfbc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(159, 61, 28, 0.14), transparent 36%),
        linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 18px 50px rgba(60, 39, 24, 0.10);
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted);
    }

    p + p {
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">AIVIA</div>
    <h1>現在、このサイトは非公開です。</h1>
    <p>公開内容の見直しのため、外部からの閲覧を停止しています。</p>
    <p>必要に応じて再公開します。</p>
  </main>
</body>
</html>
